<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Rankings Hub — All Leaderboards in One Place</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-icon">⚡</div>
        <div>
          <h1 class="brand-title">AI Rankings Hub</h1>
          <p class="brand-sub">5 leaderboards · updated daily</p>
        </div>
      </div>
      <div class="header-controls">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="searchInput" type="text" class="search-input" placeholder="Search model..." autocomplete="off" />
          <button id="clearSearch" class="clear-btn" style="display:none">✕</button>
        </div>
        <button id="refreshBtn" class="refresh-btn" title="Refresh data">
          <span class="refresh-icon">↻</span> Refresh
        </button>
      </div>
    </div>
    <div class="filter-bar">
      <div class="filter-wrap">
        <span class="filter-label">Filter by:</span>
        <div id="categoryFilters" class="category-filters">
          <button class="cat-btn active" data-cat="all">All</button>
          <button class="cat-btn" data-cat="code">Code</button>
          <button class="cat-btn" data-cat="vision">Vision</button>
          <button class="cat-btn" data-cat="agent">Agent</button>
          <button class="cat-btn" data-cat="search">Search</button>
        </div>
      </div>
      <div id="statusBar" class="status-bar">
        <span id="statusText" class="status-text">Loading...</span>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="searchOverlay" class="search-overlay" style="display:none">
      <div class="search-overlay-header">
        <span id="searchResultCount"></span>
      </div>
      <div id="searchResults" class="search-results-grid"></div>
    </div>

    <div id="rankingsGrid" class="rankings-grid"></div>
  </main>

  <footer class="footer">
    <p>Data sourced from:
      <a href="https://artificialanalysis.ai/leaderboards/models" target="_blank">Artificial Analysis</a> ·
      <a href="https://openrouter.ai/rankings" target="_blank">OpenRouter</a> ·
      <a href="https://llm-stats.com" target="_blank">LLM Stats</a> ·
      <a href="https://huggingface.co/spaces/lmarena-ai/chatbot-arena" target="_blank">Chatbot Arena</a> ·
      <a href="https://arena.ai/leaderboard/text" target="_blank">Arena.ai</a>
    </p>
  </footer>

  <div id="toast" class="toast" style="display:none"></div>

  <script src="/js/app.js"></script>
</body>
</html>
